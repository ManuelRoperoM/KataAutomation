<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TODO App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 400px; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; font-weight: 500; }
    input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    input:focus { outline: none; border-color: #4f46e5; }
    button[type="submit"] { width: 100%; padding: 0.625rem; background: #4f46e5; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
    button[type="submit"]:hover { background: #4338ca; }
    .alert { padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
    .alert--error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert--visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Iniciar sesión</h1>
    <div class="alert alert--error" data-testid="login-error" id="loginError"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit">Iniciar sesión</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('alert--visible');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.detail || 'Credenciales inválidas';
          errorEl.classList.add('alert--visible');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userName', data.user.name);
        window.location.href = '/dashboard';
      } catch {
        errorEl.textContent = 'Error de conexión';
        errorEl.classList.add('alert--visible');
      }
    });
  </script>
</body>
</html>
