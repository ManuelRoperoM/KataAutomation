<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Tareas — TODO App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }
    .navbar { background: #4f46e5; color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem; }
    .navbar a { color: white; text-decoration: none; opacity: 0.85; }
    .navbar a:hover { opacity: 1; }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .add-form input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    .add-form button { padding: 0.5rem 1rem; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .filter-section { margin-bottom: 1rem; display: flex; gap: 0.25rem; }
    .filter-section button { padding: 0.375rem 0.75rem; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .filter-section button.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
    .todo-item:last-child { border-bottom: none; }
    .todo-item label { flex: 1; cursor: pointer; }
    .todo-item.completed label { text-decoration: line-through; color: #999; }
    .todo-item .delete-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 0.875rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .todo-item .delete-btn:hover { background: #fef2f2; }
    .edit-input { border: 1px solid #4f46e5; border-radius: 4px; padding: 0.25rem 0.5rem; font-size: 0.875rem; }
    .empty { color: #999; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <strong>TODO App</strong>
    <a href="/dashboard">Dashboard</a>
    <a href="/todos" data-testid="nav-todos">Mis Tareas</a>
    <a href="/login" id="logoutLink">Cerrar sesión</a>
  </nav>
  <div class="container">
    <div class="card">
      <h1>Mis Tareas</h1>
      <div class="add-form">
        <input type="text" data-testid="todo-input" id="todoInput" placeholder="Nueva tarea...">
        <button data-testid="add-todo-button" id="addBtn">Agregar</button>
      </div>
      <div class="filter-section" data-testid="filter-bar">
        <button class="active" data-testid="filter-all" data-filter="all">Todas</button>
        <button data-testid="filter-active" data-filter="active">Activas</button>
        <button data-testid="filter-completed" data-filter="completed">Completadas</button>
      </div>
      <ul class="todo-list" data-testid="todo-list" id="todoList"></ul>
    </div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    let todos = [];
    let currentFilter = 'all';

    async function loadTodos() {
      const res = await fetch('/api/todos', { headers });
      if (res.status === 401) { window.location.href = '/login'; return; }
      todos = await res.json();
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (currentFilter === 'active') return !t.completed;
        if (currentFilter === 'completed') return t.completed;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">No hay tareas</li>';
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-testid="todo-item" data-id="${todo.id}">
          <input type="checkbox" ${todo.completed ? 'checked' : ''} aria-label="Completar ${todo.title}">
          <label>${todo.title}</label>
          <button class="delete-btn" aria-label="Eliminar" role="button">Eliminar</button>
        </li>
      `).join('');

      list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', async (e) => {
          const item = e.target.closest('.todo-item');
          const id = item.dataset.id;
          const completed = e.target.checked;
          await fetch(`/api/todos/${id}`, { method: 'PUT', headers, body: JSON.stringify({ completed }) });
          await loadTodos();
        });
      });

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const item = e.target.closest('.todo-item');
          const id = item.dataset.id;
          await fetch(`/api/todos/${id}`, { method: 'DELETE', headers });
          await loadTodos();
        });
      });

      list.querySelectorAll('label').forEach(lbl => {
        lbl.addEventListener('dblclick', (e) => {
          const item = e.target.closest('.todo-item');
          const id = item.dataset.id;
          const currentTitle = e.target.textContent;
          const input = document.createElement('input');
          input.type = 'text';
          input.value = currentTitle;
          input.className = 'edit-input';
          e.target.replaceWith(input);
          input.focus();

          const save = async () => {
            const newTitle = input.value.trim();
            if (newTitle && newTitle !== currentTitle) {
              await fetch(`/api/todos/${id}`, { method: 'PUT', headers, body: JSON.stringify({ title: newTitle }) });
            }
            await loadTodos();
          };

          input.addEventListener('blur', save);
          input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') save(); });
        });
      });
    }

    document.getElementById('addBtn').addEventListener('click', async () => {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      await fetch('/api/todos', { method: 'POST', headers, body: JSON.stringify({ title }) });
      input.value = '';
      await loadTodos();
    });

    document.getElementById('todoInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTodos();
      });
    });

    document.getElementById('logoutLink').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('userName');
    });

    loadTodos();
  </script>
</body>
</html>
